version: '3.8'

services:
  backend:
    build: ./backend
    container_name: taskmanager_backend
    ports:
      - "5001:5001"
    networks:
      - tasknet

  frontend:
    build: ./frontend
    container_name: taskmanager_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - tasknet

networks:
  tasknet:
    driver: bridge